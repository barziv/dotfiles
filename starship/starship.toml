# add_newline = false
# Two-line prompt: info line on top, command line below
format = """$hostname$git_branch$git_metrics$git_status$git_state$fill$nodejs$python$cmd_duration
$character"""
palette = "catppuccin_mocha"
# right side aligns to last (command) line in nushell
# right_format = """$cmd_duration"""
# command_timeout = 1000

[fill]
symbol = ' '

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[->](bold green)'
error_symbol = '[->](bold red)'

[hostname]
disabled=false
ssh_only = false
format = '[$ssh_symbol$hostname]($style) | '

[nodejs]
format = '[$symbol($version )]($style)'
disabled = false
style = 'bold green'

[python]
format = '[${symbol}${pyenv_prefix}(\($virtualenv\))($version )]($style)'
style = 'bold yellow'
disabled = false

[cmd_duration]
format = '[$duration]($style)'
style = 'peach'
min_time = 0
show_milliseconds = false

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
format =  '[$symbol$branch(:$remote_branch)]($style)'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bright-black"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
format=' ([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

[aws]
format = '[$symbol(profile: "$profile" )]($style)'
disabled = true
style = 'bold blue'
symbol = "aws "

[golang]
format = '[ ](bold cyan)'

[kubernetes]
symbol = '☸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "green", context_alias = "omerxx", symbol = " " },
]

[docker_context]
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

